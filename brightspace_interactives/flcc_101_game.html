<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLCC 101 Essential Knowledge Matching Game</title>
    <style>
        :root {
            --flcc-blue: #0046AD;
            --flcc-green: #58A618;
            --text-color: #333;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --error-color: #dc3545;
            --focus-outline: #0056b3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        header {
            background-color: var(--flcc-blue);
            color: white;
            padding: 1.5rem;
            text-align: center;
            border-bottom: 5px solid var(--flcc-green);
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .game-info {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .status-message {
            font-weight: bold;
            min-height: 1.5em;
            margin-bottom: 10px;
            color: var(--flcc-blue);
            font-size: 1.1rem;
        }

        .game-board {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .column {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .column h2 {
            text-align: center;
            color: var(--flcc-blue);
            font-size: 1.2rem;
            margin-top: 0;
        }

        .card {
            background-color: var(--card-bg);
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
            text-align: left;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-color);
        }

        .card:hover:not(:disabled) {
            border-color: var(--flcc-blue);
            background-color: #eef4ff;
        }

        .card:focus {
            outline: 3px solid var(--focus-outline);
            outline-offset: 2px;
        }

        .card.selected {
            background-color: var(--flcc-blue);
            color: white;
            border-color: var(--flcc-blue);
            transform: scale(1.02);
        }

        .card.matched {
            background-color: var(--flcc-green);
            color: black; /* Black text on FLCC Green ensures WCAG AA compliance (Ratio ~6.8:1) */
            border-color: var(--flcc-green);
            cursor: default;
            font-weight: bold;
        }

        .card.wrong {
            background-color: var(--error-color);
            color: white;
            border-color: var(--error-color);
            animation: shake 0.5s;
        }

        .checkmark {
            display: none;
            font-size: 1.2rem;
            margin-left: 10px;
        }

        .card.matched .checkmark {
            display: inline-block;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }

        .reset-btn {
            display: block;
            margin: 2rem auto;
            padding: 10px 20px;
            background-color: var(--flcc-blue);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .reset-btn:hover {
            background-color: #003380;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .game-board {
                flex-direction: column;
            }
            .column {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>FLCC 101 Essential Knowledge</h1>
    <p>Match the service to its description</p>
</header>

<div class="container">
    <div class="game-info">
        <div id="status" class="status-message" aria-live="polite">Select a term and its definition.</div>
    </div>

    <div class="game-board">
        <div class="column" id="terms-col">
            <h2>Services</h2>
            <!-- Terms injected by JS -->
        </div>
        <div class="column" id="defs-col">
            <h2>Descriptions</h2>
            <!-- Definitions injected by JS -->
        </div>
    </div>

    <button class="reset-btn" onclick="initGame()">Reset Game</button>
</div>

<script>
    const gameData = [
        { 
            term: "One Stop", 
            def: "Questions about admissions, course registration, financial aid, billing, and more." 
        },
        { 
            term: "Center for Student Well-Being", 
            def: "Medical health, mental health, counseling, and basic needs including food and transportation." 
        },
        { 
            term: "Library", 
            def: "Academic resources, research support, quiet study, and group collaboration." 
        },
        { 
            term: "Tutoring Center", 
            def: "Free tutoring, learning support, and help with study skills." 
        },
        { 
            term: "Career Services", 
            def: "Resources to help you find, prepare for, and land your dream job." 
        },
        { 
            term: "Transfer Services", 
            def: "Researching four-year schools, planning courses, and transfer events." 
        }
    ];

    let selectedTerm = null;
    let selectedDef = null;
    let isProcessing = false;

    function initGame() {
        const termsCol = document.getElementById('terms-col');
        const defsCol = document.getElementById('defs-col');
        const status = document.getElementById('status');
        
        // Clear existing content (keep headers)
        termsCol.innerHTML = '<h2>Services</h2>';
        defsCol.innerHTML = '<h2>Descriptions</h2>';
        status.textContent = "Select a term and its definition.";
        status.style.color = "var(--flcc-blue)";

        selectedTerm = null;
        selectedDef = null;
        isProcessing = false;

        // Create arrays and shuffle
        const terms = [...gameData].sort(() => Math.random() - 0.5);
        const defs = [...gameData].sort(() => Math.random() - 0.5);

        // Render Terms
        terms.forEach(item => {
            const btn = createCard(item.term, 'term', item.term);
            termsCol.appendChild(btn);
        });

        // Render Definitions
        defs.forEach(item => {
            const btn = createCard(item.def, 'def', item.term);
            defsCol.appendChild(btn);
        });
    }

    function createCard(text, type, matchId) {
        const btn = document.createElement('button');
        btn.className = 'card';
        btn.innerHTML = `<span>${text}</span><span class="checkmark">✔</span>`;
        btn.dataset.type = type;
        btn.dataset.matchId = matchId;
        btn.setAttribute('aria-label', text);
        
        btn.onclick = () => handleCardClick(btn);
        return btn;
    }

    function handleCardClick(btn) {
        if (isProcessing || btn.classList.contains('matched') || btn.classList.contains('selected')) return;

        const type = btn.dataset.type;

        // Handle selection
        if (type === 'term') {
            if (selectedTerm) selectedTerm.classList.remove('selected');
            selectedTerm = btn;
        } else {
            if (selectedDef) selectedDef.classList.remove('selected');
            selectedDef = btn;
        }

        btn.classList.add('selected');

        // Check match if both selected
        if (selectedTerm && selectedDef) {
            checkMatch();
        }
    }

    function checkMatch() {
        isProcessing = true;
        const status = document.getElementById('status');
        
        const termId = selectedTerm.dataset.matchId;
        const defId = selectedDef.dataset.matchId;

        if (termId === defId) {
            // Correct Match
            selectedTerm.classList.remove('selected');
            selectedDef.classList.remove('selected');
            
            selectedTerm.classList.add('matched');
            selectedDef.classList.add('matched');
            
            // Update accessibility labels
            selectedTerm.setAttribute('aria-label', selectedTerm.textContent + " - Matched");
            selectedDef.setAttribute('aria-label', selectedDef.textContent + " - Matched");
            
            selectedTerm.disabled = true;
            selectedDef.disabled = true;

            status.textContent = "Correct Match!";
            status.style.color = "var(--flcc-green)";

            selectedTerm = null;
            selectedDef = null;
            isProcessing = false;
        } else {
            // Incorrect Match
            selectedTerm.classList.add('wrong');
            selectedDef.classList.add('wrong');
            status.textContent = "Incorrect. Try again.";
            status.style.color = "var(--error-color)";

            setTimeout(() => {
                selectedTerm.classList.remove('selected', 'wrong');
                selectedDef.classList.remove('selected', 'wrong');
                selectedTerm = null;
                selectedDef = null;
                status.textContent = "Select a term and its definition.";
                status.style.color = "var(--flcc-blue)";
                isProcessing = false;
            }, 1000);
        }
    }

    // Initialize on load
    window.onload = initGame;

</script>

</body>
</html>
